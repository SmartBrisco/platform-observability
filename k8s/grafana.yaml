apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:       #labels to match
      app: grafana 
  template:
    metadata:
      labels:
        app: grafana    
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest # Official grafana image
          env:
          - name:  GF_SECURITY_ADMIN_PASSWORD
            value: "admin"
          ports:
          - containerPort: 3000
---  
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  selector:
    app: grafana
  type: ClusterIP
  ports:
  - name: web
    protocol: TCP
    port: 3000
    targetPort: 3000